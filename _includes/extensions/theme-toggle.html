<div class="theme-toggle">
  <input type="checkbox" id="theme-switch">
  <label for="theme-switch">
    <div class="toggle"></div>
    <div class="names">
      <p class="light">Light</p>
      <p class="dark">Dark</p>
    </div>
  </label>
</div>

<script>
(function() {
  const sw = document.getElementById('theme-switch');
  const html = document.documentElement;
  const storageKey = 'theme';

  // Load session preference
  const stored = JSON.parse(sessionStorage.getItem(storageKey) || '{}');
  let nightShift = stored && typeof stored.nightShift === 'boolean'
    ? stored.nightShift
    : true; // default dark

  // Apply initial theme & sync checkbox
  html.dataset.theme = nightShift ? 'dark' : 'light';
  sw.checked = nightShift;

  // Animation helper
  const transition = () => {
    html.classList.add('transition');
    setTimeout(() => html.classList.remove('transition'), 1000);
  };

  // Toggle event
  sw.addEventListener('change', (e) => {
    const isDark = e.target.checked;
    transition();
    html.dataset.theme = isDark ? 'dark' : 'light';
    sessionStorage.setItem(storageKey, JSON.stringify({ nightShift: isDark }));
  });
})();
</script>
